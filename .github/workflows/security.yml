name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Removed the php-insights and phpcpd jobs: phpinsights is not a project
  # dependency (the job errored on every run) and its quality thresholds don't
  # reflect the codebase, and sebastian/phpcpd is abandoned and doesn't install
  # on PHP 8.5. Reinstate as require-dev tools with realistic thresholds if the
  # team wants them gating.
  security:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      # --locked audits composer.lock directly. Without it, `composer audit` looks
      # for an installed vendor/ tree, which no step here creates, so the job died
      # with "No installed packages found" on every run — red since at least
      # 2026-07-14 and reporting nothing. Auditing the lock is also what we want:
      # it checks the versions that actually get deployed, and needs no install.
      - name: Run Composer security audit
        run: composer audit --locked --no-interaction
