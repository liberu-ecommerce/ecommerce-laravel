[PHP]
post_max_size = 100M
upload_max_filesize = 100M
expose_php = 0
realpath_cache_size = 16M
realpath_cache_ttl = 360

[Opcache]
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256M
opcache.use_cwd = 0
opcache.max_file_size = 0
opcache.max_accelerated_files = 32531
opcache.validate_timestamps = 0
opcache.file_update_protection = 0
opcache.interned_strings_buffer = 16
; opcache.file_cache took "60" here from 3ba435b (2024-02-22) until it was
; removed. It expects a directory path, not a number, so PHP refused to start at
; all inside the image:
;
;   Fatal Error opcache.file_cache must be a full path of an accessible directory
;
; Every php invocation in the container died on it, artisan included. Dropped
; rather than pointed at a directory: file_cache is an optional disk-backed
; second tier on top of the in-memory cache, it has never once worked here, and
; Octane keeps a warm process anyway. Add it back with a real path (and a mkdir)
; if a profiler ever asks for it.

[JIT]
opcache.jit_buffer_size = 128M
opcache.jit = function
opcache.jit_prof_threshold = 0.001
opcache.jit_max_root_traces = 2048
opcache.jit_max_side_traces = 256

[zlib]
zlib.output_compression = On
zlib.output_compression_level = 9
