---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-laravel-reverb
  namespace: ecommerce-laravel
  labels:
    app.kubernetes.io/name: ecommerce-laravel
    app.kubernetes.io/component: reverb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-laravel-reverb
  template:
    metadata:
      labels:
        app: ecommerce-laravel-reverb
        app.kubernetes.io/name: ecommerce-laravel
        app.kubernetes.io/component: reverb
    spec:
      containers:
        - name: reverb
          image: ecommerce-laravel:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: ws
          envFrom:
            - configMapRef:
                name: ecommerce-laravel-config
            - secretRef:
                name: ecommerce-laravel-secret
          env:
            - name: CONTAINER_MODE
              value: reverb
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
