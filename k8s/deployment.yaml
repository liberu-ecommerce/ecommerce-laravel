apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-laravel-app
  namespace: ecommerce-laravel
  labels:
    app.kubernetes.io/name: ecommerce-laravel
    app.kubernetes.io/component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-laravel-app
  template:
    metadata:
      labels:
        app: ecommerce-laravel-app
        app.kubernetes.io/name: ecommerce-laravel
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: app
          image: ecommerce-laravel:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: ecommerce-laravel-config
            - secretRef:
                name: ecommerce-laravel-secret
          env:
            - name: CONTAINER_MODE
              value: http
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage/app
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: ecommerce-laravel-storage-pvc
---
apiVersion: apps/v1
kind: Deployment
