        app: ecommerce-laravel-reverb
        app.kubernetes.io/name: ecommerce-laravel
        app.kubernetes.io/component: reverb
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: reverb
          image: ecommerce-laravel:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: ws
          envFrom:
            - configMapRef:
                name: ecommerce-laravel-config
            - secretRef:
                name: ecommerce-laravel-secret
          env:
            - name: CONTAINER_MODE
              value: reverb
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
