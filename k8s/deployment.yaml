apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-laravel-app
  namespace: ecommerce-laravel
  labels:
    app.kubernetes.io/name: ecommerce-laravel
    app.kubernetes.io/component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-laravel-app
  template:
    metadata:
      labels:
        app: ecommerce-laravel-app
        app.kubernetes.io/name: ecommerce-laravel
        app.kubernetes.io/component: app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z ${DB_HOST} ${DB_PORT:-3306}; do echo "waiting for db..."; sleep 2; done']
          envFrom:
            - configMapRef:
                name: ecommerce-laravel-config
            - secretRef:
                name: ecommerce-laravel-secret
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        - name: run-migrations
          image: ecommerce-laravel:latest
          imagePullPolicy: Always
          command: ['php', 'artisan', 'migrate', '--force']
          envFrom:
            - configMapRef:
                name: ecommerce-laravel-config
            - secretRef:
                name: ecommerce-laravel-secret
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: app
          image: ecommerce-laravel:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: ecommerce-laravel-config
            - secretRef:
                name: ecommerce-laravel-secret
          env:
            - name: CONTAINER_MODE
              value: http
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage/app
            - name: cache
              mountPath: /var/www/html/storage/framework/cache
            - name: sessions
              mountPath: /var/www/html/storage/framework/sessions
            - name: views
              mountPath: /var/www/html/storage/framework/views
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: ecommerce-laravel-storage-pvc
        - name: cache
          emptyDir: {}
        - name: sessions
          emptyDir: {}
        - name: views
          emptyDir: {}
---
